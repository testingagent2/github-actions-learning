<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Actions App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
        }
        h1 { font-size: 3em; margin-bottom: 10px; }
        p  { font-size: 1.2em; opacity: 0.9; }
        .badge {
            background: #28a745;
            padding: 8px 20px;
            border-radius: 20px;
            margin-top: 20px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Hello GitHub Actions!</h1>
        <p>This app was deployed automatically!</p>
        <p>No manual work needed!</p>
        <div class="badge">✅ Deployed via CI/CD</div>
    </div>
</body>
</html>
