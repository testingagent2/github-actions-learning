name: Secrets and Variables Demo

on:
  push:
    branches: [main]

env:
  APP_ENV: production
  APP_VERSION: "1.0.0"

jobs:
  demo:
    runs-on: ubuntu-latest

    env:
      JOB_NAME: secrets-demo-job

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Use Secrets
        env:
          MY_NAME: ${{ secrets.MY_NAME }}
          MY_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: |
          echo "Hello my name is $MY_NAME"
          echo "My secret key is $MY_KEY"
          echo "Notice how secret prints as ***"

      - name: 🌍 Use Environment Variables
        run: |
          echo "App Environment: $APP_ENV"
          echo "App Version: $APP_VERSION"
          echo "Job Name: $JOB_NAME"

      - name: 📊 Show all together
        env:
          MY_NAME: ${{ secrets.MY_NAME }}
        run: |
          echo "👤 Name: $MY_NAME"
          echo "🌍 Environment: $APP_ENV"
          echo "📦 Version: $APP_VERSION"
